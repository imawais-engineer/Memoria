<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="#121528"/>
  <rect width="32" height="32" rx="8" fill="url(#bg)" opacity="0.9"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#1c2140"/>
      <stop offset="100%" stop-color="#121528"/>
    </linearGradient>
  </defs>
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="700"
    fill="#6c8cff"
    filter="url(#glow)"
  >M</text>
</svg>
