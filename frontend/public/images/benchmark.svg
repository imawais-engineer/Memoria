<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="Benchmark chart: without memory 0.64 vs with memory 0.92">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#48d597"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="640" height="320" rx="16" fill="#0f1220"/>
  <rect x="1" y="1" width="638" height="318" rx="15" fill="none" stroke="#2a2f4a" stroke-width="1"/>
  <text x="32" y="44" fill="#f4f6fc" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">Decision accuracy (composite score)</text>
  <text x="32" y="68" fill="#b4bdd6" font-family="Inter, system-ui, sans-serif" font-size="13">12 simulated user scenarios Ę qwen-plus</text>

  <text x="32" y="130" fill="#b4bdd6" font-family="Inter, system-ui, sans-serif" font-size="14">Without memory</text>
  <rect x="160" y="112" width="400" height="28" rx="14" fill="#1e2238"/>
  <rect x="160" y="112" width="256" height="28" rx="14" fill="#4a5568"/>
  <text x="572" y="131" fill="#f4f6fc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="end">0.64</text>

  <text x="32" y="190" fill="#b4bdd6" font-family="Inter, system-ui, sans-serif" font-size="14">With Memoria</text>
  <rect x="160" y="172" width="400" height="28" rx="14" fill="#1e2238"/>
  <rect x="160" y="172" width="368" height="28" rx="14" fill="url(#glow)" filter="url(#blur)" opacity="0.35"/>
  <rect x="160" y="172" width="368" height="28" rx="14" fill="url(#glow)"/>
  <text x="572" y="191" fill="#48d597" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="end">0.92</text>

  <text x="32" y="260" fill="#48d597" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">+77.6% average improvement</text>
  <text x="32" y="286" fill="#8b95b0" font-family="Inter, system-ui, sans-serif" font-size="12">Accuracy + safety + coherence Ę scripts/benchmark_results.json</text>
</svg>
